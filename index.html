<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Blossom Kitchen & Bakery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://gumroad.com/js/gumroad.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo-wrap">
                <img src="assets/logo-banner.png" alt="Orange Blossom Bakery" class="nav-logo">
            </div>
            <div class="nav-links">
                <a href="#products">The Bakery</a>
                <a href="about.html">Our Story</a>
                <a href="#contact" class="nav-cta">Connect</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-inner">
            <div class="brand-status-row">
                <img src="assets/logo_round.png" alt="Orange Blossom Logo" class="hero-logo-small">
                <div id="status-badge" class="status-badge">
                    <span id="status-text">Synchronizing...</span>
                </div>
            </div>
            
            <div class="hero-text-wrap">
                <h1>Handcrafted <br><em>with</em> Love.</h1>
                <p id="hero-subtext">Sourdough fermented for 24 hours, baked fresh for your morning.</p>
                <div class="hero-btns">
                    <a href="#products" class="btn-main">Browse the Bake</a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function updateBakeryStatus() {
            const now = new Date();
            const cutoff = 10; 
            const statusBadge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            const heroSubtext = document.getElementById('hero-subtext');

            if (now.getHours() < cutoff) {
                statusBadge.className = "status-badge status-open";
                statusText.innerText = "Accepting Orders for Tomorrow";
                heroSubtext.innerHTML = "Good morning! Order in the next <strong>" + (cutoff - now.getHours()) + " hours</strong> to have fresh bread on your table tomorrow.";
            } else {
                statusBadge.className = "status-badge status-prep";
                statusText.innerText = "Currently in Prep Mode";
                // Friendlier and clearer message
                heroSubtext.innerHTML = "Today's baking has already begun! If you order now, we'll start your dough first thing tomorrow for a fresh delivery the morning after.";
            }
        }
        updateBakeryStatus();
    </script>
</body>
</html>
