<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Blossom Kitchen & Bakery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo-wrap">
                <a href="index.html"><img src="assets/logo-banner.png" alt="Orange Blossom Bakery" class="nav-logo"></a>
            </div>
            <div class="nav-links">
                <a href="menu.html">The Menu</a>
                <a href="about.html">Our Story</a>
                <a href="#contact" class="nav-cta">Connect</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-inner">
            <div class="brand-dashboard">
                <div class="hero-logo-container">
                    <img src="assets/logo_round.png" alt="Orange Blossom Logo" class="hero-logo-small">
                </div>
                <div id="status-badge" class="status-badge">
                    <span id="status-text">Synchronizing...</span>
                </div>
            </div>
            
            <div class="hero-text-wrap">
                <div class="title-shield">
                    <h1 class="hero-title">Handcrafted <br><em>with</em> Love.</h1>
                </div>
                <p id="hero-subtext"></p>
                <div class="hero-btns">
                    <a href="menu.html" class="btn-hero">View Menu</a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function updateBakeryStatus() {
            const now = new Date();
            const cutoff = 10; 
            const statusBadge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            const heroSubtext = document.getElementById('hero-subtext');

            if (now.getHours() < cutoff) {
                statusBadge.className = "status-badge status-open";
                statusText.innerText = "Order Now for Tomorrow";
                heroSubtext.innerHTML = "Order by <strong>10 AM today</strong> for fresh bread tomorrow!";
            } else {
                statusBadge.className = "status-badge status-prep";
                statusText.innerText = "Currently in Prep Mode";
                heroSubtext.innerHTML = "Order now to secure your <strong>fresh bread for Friday morning.</strong>";
            }
        }
        updateBakeryStatus();
    </script>
</body>
</html>
